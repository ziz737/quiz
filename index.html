<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مسابقات تفاعلية - Quiz Master</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow-x: hidden;
        }

        /* Animated background */
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 40% 20%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: backgroundMove 15s ease-in-out infinite;
            z-index: 0;
        }

        @keyframes backgroundMove {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(30px, 30px); }
        }

        .container {
            position: relative;
            z-index: 1;
            width: 90%;
            max-width: 1200px;
            padding: 20px;
        }

        .screen {
            display: none;
            animation: fadeIn 0.5s ease-in;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Home Screen */
        .home-screen {
            text-align: center;
        }

        .logo {
            font-size: 4rem;
            margin-bottom: 20px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 10px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        .subtitle {
            color: rgba(255, 255, 255, 0.9);
            font-size: 1.3rem;
            margin-bottom: 50px;
        }

        .button-group {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .btn {
            background: white;
            border: none;
            padding: 20px 40px;
            border-radius: 15px;
            font-size: 1.5rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            font-family: 'Tajawal', sans-serif;
            min-width: 250px;
        }

        .btn-host {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .btn-player {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        /* Card Style */
        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
            margin: 0 auto;
        }

        .card h2 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 30px;
            text-align: center;
        }

        .input-group {
            margin-bottom: 25px;
        }

        .input-group label {
            display: block;
            color: #555;
            font-size: 1.1rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .input-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1.2rem;
            font-family: 'Tajawal', sans-serif;
            transition: border 0.3s ease;
            text-align: center;
        }

        .input-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .room-code-display {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.3);
        }

        .room-code-display h3 {
            font-size: 1.5rem;
            margin-bottom: 15px;
            opacity: 0.9;
        }

        .room-code {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 15px;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.3);
        }

        /* Host Dashboard */
        .dashboard {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }

        .dashboard-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }

        .player-card {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
        }

        .player-card:hover {
            transform: translateY(-5px);
        }

        .player-name {
            font-size: 1.3rem;
            font-weight: 700;
            margin-bottom: 10px;
        }

        .player-score {
            font-size: 2rem;
            font-weight: 900;
        }

        .question-control {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 20px;
        }

        .current-question {
            background: #e3f2fd;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            border-right: 5px solid #2196f3;
        }

        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-display {
            background: white;
            padding: 15px;
            border-radius: 10px;
            border: 2px solid #e0e0e0;
            font-weight: 600;
        }

        .option-display.correct {
            background: #4caf50;
            color: white;
            border-color: #4caf50;
        }

        /* Player Screen */
        .player-screen {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            min-height: 80vh;
        }

        .player-header {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .question-display {
            background: #f8f9fa;
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            text-align: center;
        }

        .question-text {
            font-size: 1.8rem;
            color: #333;
            margin-bottom: 30px;
            font-weight: 600;
            line-height: 1.6;
        }

        .answers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
        }

        .answer-btn {
            padding: 25px;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            font-family: 'Tajawal', sans-serif;
            position: relative;
            overflow: hidden;
        }

        .answer-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
        }

        .answer-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .answer-btn.option-0 {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .answer-btn.option-1 {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            color: white;
        }

        .answer-btn.option-2 {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }

        .answer-btn.option-3 {
            background: linear-gradient(135deg, #43e97b 0%, #38f9d7 100%);
            color: white;
        }

        .answer-btn.correct {
            animation: correctAnswer 0.5s ease;
        }

        .answer-btn.wrong {
            animation: wrongAnswer 0.5s ease;
        }

        @keyframes correctAnswer {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); background: #4caf50; }
        }

        @keyframes wrongAnswer {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        /* Timer */
        .timer {
            text-align: center;
            margin-bottom: 20px;
        }

        .timer-circle {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            font-size: 2.5rem;
            font-weight: 900;
            color: white;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .progress-bar {
            width: 100%;
            height: 10px;
            background: #e0e0e0;
            border-radius: 5px;
            overflow: hidden;
            margin-top: 20px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #4caf50 0%, #8bc34a 100%);
            transition: width 0.3s ease;
        }

        /* Waiting State */
        .waiting-state {
            text-align: center;
            padding: 50px;
        }

        .waiting-state i {
            font-size: 5rem;
            color: #667eea;
            animation: pulse 2s ease-in-out infinite;
        }

        .waiting-state h3 {
            font-size: 2rem;
            color: #555;
            margin-top: 30px;
        }

        /* Results */
        .results-display {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-top: 20px;
        }

        .fastest-player {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 15px rgba(255, 215, 0, 0.4);
        }

        /* Confetti */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: #f0f;
            position: absolute;
            animation: confetti-fall 3s linear infinite;
        }

        @keyframes confetti-fall {
            to {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 2rem; }
            .subtitle { font-size: 1rem; }
            .btn { min-width: 200px; padding: 15px 30px; font-size: 1.2rem; }
            .room-code { font-size: 3rem; letter-spacing: 10px; }
            .answers-grid { grid-template-columns: 1fr; }
            .question-text { font-size: 1.4rem; }
        }

        .back-btn {
            background: #f44336;
            color: white;
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: 600;
            font-family: 'Tajawal', sans-serif;
            margin-bottom: 20px;
        }

        .back-btn:hover {
            background: #d32f2f;
        }

        /* Leaderboard */
        .leaderboard {
            background: white;
            border-radius: 15px;
            padding: 20px;
            margin-top: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .leaderboard h3 {
            color: #667eea;
            margin-bottom: 15px;
            text-align: center;
        }

        .leaderboard-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            border-radius: 10px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .leaderboard-item.first {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            font-size: 1.2rem;
        }

        .leaderboard-item.second {
            background: linear-gradient(135deg, #c0c0c0 0%, #e8e8e8 100%);
            color: #333;
        }

        .leaderboard-item.third {
            background: linear-gradient(135deg, #cd7f32 0%, #e6a857 100%);
            color: white;
        }

        .rank-emoji {
            font-size: 1.5rem;
            margin-left: 10px;
        }

        .error-message {
            background: #ffebee;
            color: #c62828;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }

        .success-message {
            background: #e8f5e9;
            color: #2e7d32;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Home Screen -->
        <div id="homeScreen" class="screen active">
            <div class="home-screen">
                <div class="logo">🏆</div>
                <h1>مسابقات تفاعلية</h1>
                <p class="subtitle">اختبر معلوماتك مع أصدقائك في مسابقة مشوقة!</p>
                <div class="button-group">
                    <button class="btn btn-host" onclick="showHostLogin()">
                        <i class="fas fa-crown"></i> دخول كمضيف
                    </button>
                    <button class="btn btn-player" onclick="showPlayerLogin()">
                        <i class="fas fa-user"></i> دخول كلاعب
                    </button>
                </div>
            </div>
        </div>

        <!-- Host Login Screen -->
        <div id="hostLoginScreen" class="screen">
            <div class="card">
                <button class="back-btn" onclick="showHome()">← رجوع</button>
                <h2><i class="fas fa-crown"></i> دخول المضيف</h2>
                <div id="hostLoginError"></div>
                <div class="input-group">
                    <label>كلمة المرور</label>
                    <input type="password" id="hostPassword" placeholder="أدخل كلمة المرور" onkeypress="if(event.key==='Enter') hostLogin()">
                </div>
                <button class="btn btn-host" style="width: 100%;" onclick="hostLogin()">دخول</button>
                <p style="text-align: center; margin-top: 15px; color: #999;">كلمة المرور: host123</p>
            </div>
        </div>

        <!-- Player Login Screen -->
        <div id="playerLoginScreen" class="screen">
            <div class="card">
                <button class="back-btn" onclick="showHome()">← رجوع</button>
                <h2><i class="fas fa-user"></i> دخول اللاعب</h2>
                <div id="playerLoginError"></div>
                <div class="input-group">
                    <label>كود الغرفة (3 أرقام)</label>
                    <input type="text" id="roomCode" maxlength="3" placeholder="123" pattern="[0-9]*" inputmode="numeric">
                </div>
                <div class="input-group">
                    <label>اسمك</label>
                    <input type="text" id="playerName" placeholder="أدخل اسمك" onkeypress="if(event.key==='Enter') playerJoin()">
                </div>
                <button class="btn btn-player" style="width: 100%;" onclick="playerJoin()">انضمام</button>
            </div>
        </div>

        <!-- Host Dashboard Screen -->
        <div id="hostDashboard" class="screen">
            <div class="dashboard">
                <button class="back-btn" onclick="endGame()">إنهاء المسابقة</button>
                <div class="dashboard-header">
                    <div>
                        <h2 style="margin: 0;"><i class="fas fa-crown"></i> لوحة تحكم المضيف</h2>
                    </div>
                    <div class="room-code-display" style="margin: 0; padding: 15px 25px;">
                        <h3 style="font-size: 1rem; margin: 0 0 5px 0;">كود الغرفة</h3>
                        <div class="room-code" style="font-size: 2.5rem; letter-spacing: 10px;" id="hostRoomCode">000</div>
                    </div>
                </div>

                <div class="leaderboard">
                    <h3><i class="fas fa-trophy"></i> اللاعبون (<span id="playersCount">0</span>)</h3>
                    <div id="playersList" class="players-list"></div>
                </div>

                <div class="question-control">
                    <h3 style="color: #667eea; margin-bottom: 20px;"><i class="fas fa-question-circle"></i> التحكم بالأسئلة</h3>
                    <div id="questionDisplay"></div>
                    <button class="btn btn-host" style="width: 100%; margin-top: 20px;" onclick="sendQuestion()" id="sendQuestionBtn">
                        <i class="fas fa-paper-plane"></i> إرسال السؤال التالي
                    </button>
                </div>

                <div id="resultsDisplay" class="results-display" style="display: none;">
                    <h3 style="color: #667eea; margin-bottom: 15px;">نتائج السؤال</h3>
                    <div id="resultsContent"></div>
                    <button class="btn btn-player" style="width: 100%; margin-top: 20px;" onclick="nextQuestion()">
                        <i class="fas fa-forward"></i> السؤال التالي
                    </button>
                </div>
            </div>
        </div>

        <!-- Player Screen -->
        <div id="playerScreen" class="screen">
            <div class="player-screen">
                <button class="back-btn" onclick="leaveGame()">مغادرة</button>
                <div class="player-header">
                    <div>
                        <h3 style="margin: 0;" id="playerNameDisplay">اللاعب</h3>
                        <p style="margin: 5px 0 0 0; opacity: 0.9;">الغرفة: <span id="playerRoomCode">000</span></p>
                    </div>
                    <div style="text-align: left;">
                        <h3 style="margin: 0;">النقاط</h3>
                        <p style="font-size: 2rem; font-weight: 900; margin: 5px 0 0 0;" id="playerScore">0</p>
                    </div>
                </div>

                <div id="waitingState" class="waiting-state">
                    <i class="fas fa-hourglass-half"></i>
                    <h3>في انتظار السؤال التالي...</h3>
                    <p style="color: #999; margin-top: 15px;">المضيف يجهز السؤال الآن</p>
                </div>

                <div id="questionState" style="display: none;">
                    <div class="timer">
                        <div class="timer-circle" id="timerDisplay">20</div>
                        <div class="progress-bar">
                            <div class="progress-fill" id="timerProgress" style="width: 100%;"></div>
                        </div>
                    </div>

                    <div class="question-display">
                        <div class="question-text" id="playerQuestionText">السؤال يظهر هنا</div>
                        <div class="answers-grid" id="playerAnswers"></div>
                    </div>

                    <div id="playerResult" style="display: none; text-align: center; padding: 20px; border-radius: 15px; margin-top: 20px;"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-database-compat.js"></script>

    <script>
        // ================================
        // Firebase Configuration
        // ================================
        // يرجى تعديل هذا الكود بمعلومات Firebase الخاصة بك
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            databaseURL: "https://YOUR_PROJECT_ID-default-rtdb.firebaseio.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        };

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // ================================
        // Questions Database (50 Questions)
        // ================================
        const questions = [
            // علوم وطبيعة (10 أسئلة)
            { q: "ما هو أكبر كوكب في المجموعة الشمسية؟", options: ["المشتري", "زحل", "الأرض", "المريخ"], correct: 0 },
            { q: "كم عدد عظام جسم الإنسان البالغ؟", options: ["196", "206", "216", "186"], correct: 1 },
            { q: "ما هو رمز الذهب الكيميائي؟", options: ["Go", "Au", "Gd", "Ag"], correct: 1 },
            { q: "أي حيوان له ثلاثة قلوب؟", options: ["الحوت", "الأخطبوط", "القرش", "الدولفين"], correct: 1 },
            { q: "كم عدد كروموسومات الإنسان؟", options: ["23", "46", "48", "44"], correct: 1 },
            { q: "ما أسرع حيوان بري في العالم؟", options: ["الأسد", "الفهد", "النمر", "الغزال"], correct: 1 },
            { q: "ما هي أصغر وحدة في المادة؟", options: ["الجزيء", "الذرة", "الإلكترون", "البروتون"], correct: 1 },
            { q: "في أي عام هبط الإنسان على القمر؟", options: ["1965", "1967", "1969", "1971"], correct: 2 },
            { q: "ما هو أطول نهر في العالم؟", options: ["النيل", "الأمازون", "اليانغتسي", "الميسيسيبي"], correct: 0 },
            { q: "كم عدد أسنان الإنسان البالغ؟", options: ["28", "30", "32", "34"], correct: 2 },

            // جغرافيا وتاريخ (10 أسئلة)

            { q: "في أي قارة تقع مصر؟", options: ["آسيا", "أفريقيا", "أوروبا", "أمريكا"], correct: 1 },

            { q: "ما معنى CPU في الكمبيوتر؟", options: ["ذاكرة", "قرص صلب", "معالج", "شاشة"], correct: 2 },

            // رياضة وفن وترفيه (10 أسئلة)
            { q: "كم عدد لاعبي كرة القدم في الفريق الواحد؟", options: ["9", "10", "11", "12"], correct: 2 },
            { q: "من فاز بكأس العالم 2018؟", options: ["ألمانيا", "البرازيل", "فرنسا", "الأرجنتين"], correct: 2 },
            { q: "كم عدد الحلقات الأولمبية؟", options: ["4", "5", "6", "7"], correct: 1 },
            { q: "من بطل فيلم 'تايتانيك'؟", options: ["براد بيت", "ليوناردو دي كابريو", "توم كروز", "جوني ديب"], correct: 1 },
            { q: "كم عدد أوتار آلة العود؟", options: ["4", "5", "6", "7"], correct: 1 },
            { q: "من أشهر مغني البوب في العالم؟", options: ["إلفيس", "مايكل جاكسون", "مادونا", "بيونسيه"], correct: 1 },
            { q: "كم دقيقة في شوط كرة القدم؟", options: ["40", "45", "50", "60"], correct: 1 },
            { q: "من هو 'ملك البوب'؟", options: ["إلفيس بريسلي", "فريدي ميركوري", "مايكل جاكسون", "برنس"], correct: 2 },
            { q: "كم عدد لاعبي كرة السلة في الملعب؟", options: ["8", "10", "12", "14"], correct: 1 },
            { q: "من مخرج فيلم 'الأب الروحي'؟", options: ["مارتن سكورسيزي", "فرانسيس فورد كوبولا", "ستيفن سبيلبرج", "كوينتن تارانتينو"], correct: 1 }
        ];

        // ================================
        // Global Variables
        // ================================
        let currentRoom = null;
        let currentPlayer = null;
        let isHost = false;
        let questionTimer = null;
        let currentQuestionIndex = -1;
        let questionStartTime = 0;
        let playersRef = null;
        let questionRef = null;
        let answersRef = null;

        // ================================
        // Navigation Functions
        // ================================
        function showScreen(screenId) {
            document.querySelectorAll('.screen').forEach(screen => {
                screen.classList.remove('active');
            });
            document.getElementById(screenId).classList.add('active');
        }

        function showHome() {
            showScreen('homeScreen');
            if (currentRoom && playersRef) {
                playersRef.off();
            }
            if (questionRef) {
                questionRef.off();
            }
            currentRoom = null;
            currentPlayer = null;
            isHost = false;
        }

        function showHostLogin() {
            showScreen('hostLoginScreen');
            document.getElementById('hostPassword').value = '';
            document.getElementById('hostLoginError').innerHTML = '';
        }

        function showPlayerLogin() {
            showScreen('playerLoginScreen');
            document.getElementById('roomCode').value = '';
            document.getElementById('playerName').value = '';
            document.getElementById('playerLoginError').innerHTML = '';
        }

        // ================================
        // Host Functions
        // ================================
        function hostLogin() {
            const password = document.getElementById('hostPassword').value;
            if (password !== 'host123') {
                showError('hostLoginError', 'كلمة المرور غير صحيحة!');
                return;
            }

            // Generate 3-digit room code
            const roomCode = Math.floor(100 + Math.random() * 900).toString();
            currentRoom = roomCode;
            isHost = true;

            // Create room in Firebase
            database.ref('rooms/' + roomCode).set({
                host: true,
                created: Date.now(),
                currentQuestion: null,
                questionActive: false
            }).then(() => {
                document.getElementById('hostRoomCode').textContent = roomCode;
                showScreen('hostDashboard');
                listenToPlayers();
                updateQuestionDisplay();
            });
        }

        function listenToPlayers() {
            playersRef = database.ref('rooms/' + currentRoom + '/players');
            playersRef.on('value', (snapshot) => {
                const players = snapshot.val() || {};
                displayPlayers(players);
            });
        }

        function displayPlayers(players) {
            const playersList = document.getElementById('playersList');
            const playersArray = Object.entries(players).map(([id, data]) => ({
                id,
                ...data
            })).sort((a, b) => (b.score || 0) - (a.score || 0));

            document.getElementById('playersCount').textContent = playersArray.length;

            if (playersArray.length === 0) {
                playersList.innerHTML = '<p style="text-align: center; color: #999; padding: 30px;">لا يوجد لاعبون بعد... في انتظار انضمام اللاعبين</p>';
                return;
            }

            playersList.innerHTML = playersArray.map((player, index) => {
                const emoji = index === 0 ? '🥇' : index === 1 ? '🥈' : index === 2 ? '🥉' : '👤';
                return `
                    <div class="player-card">
                        <div class="player-name">${emoji} ${player.name}</div>
                        <div class="player-score">${player.score || 0} نقطة</div>
                    </div>
                `;
            }).join('');
        }

        function updateQuestionDisplay() {
            const display = document.getElementById('questionDisplay');
            if (currentQuestionIndex >= questions.length - 1) {
                display.innerHTML = `
                    <div style="text-align: center; padding: 30px;">
                        <i class="fas fa-trophy" style="font-size: 4rem; color: #ffd700;"></i>
                        <h3 style="margin-top: 20px; color: #667eea;">انتهت جميع الأسئلة!</h3>
                        <p style="color: #999; margin-top: 10px;">تم الانتهاء من المسابقة</p>
                    </div>
                `;
                document.getElementById('sendQuestionBtn').style.display = 'none';
                return;
            }

            const nextIndex = currentQuestionIndex + 1;
            const question = questions[nextIndex];
            display.innerHTML = `
                <div class="current-question">
                    <h4 style="color: #2196f3; margin-bottom: 15px;">السؤال التالي (${nextIndex + 1} من ${questions.length})</h4>
                    <p style="font-size: 1.3rem; font-weight: 600; margin-bottom: 15px;">${question.q}</p>
                    <div class="options-grid">
                        ${question.options.map((opt, i) => `
                            <div class="option-display ${i === question.correct ? 'correct' : ''}">${opt}</div>
                        `).join('')}
                    </div>
                </div>
            `;
        }

        function sendQuestion() {
            if (currentQuestionIndex >= questions.length - 1) {
                alert('انتهت جميع الأسئلة!');
                return;
            }

            currentQuestionIndex++;
            const question = questions[currentQuestionIndex];
            questionStartTime = Date.now();

            // Send question to Firebase
            database.ref('rooms/' + currentRoom + '/currentQuestion').set({
                index: currentQuestionIndex,
                question: question.q,
                options: question.options,
                startTime: questionStartTime,
                active: true
            });

            // Clear previous answers
            database.ref('rooms/' + currentRoom + '/answers').remove();

            document.getElementById('sendQuestionBtn').disabled = true;
            document.getElementById('resultsDisplay').style.display = 'none';

            // Listen for answers
            listenToAnswers();

            // Auto close question after 20 seconds
            setTimeout(() => {
                closeQuestion();
            }, 20000);
        }

        function listenToAnswers() {
            answersRef = database.ref('rooms/' + currentRoom + '/answers');
            answersRef.on('value', (snapshot) => {
                const answers = snapshot.val();
                if (answers) {
                    // Check if all players answered
                    playersRef.once('value', (playersSnapshot) => {
                        const players = playersSnapshot.val() || {};
                        const playerCount = Object.keys(players).length;
                        const answerCount = Object.keys(answers).length;
                        
                        if (answerCount >= playerCount && playerCount > 0) {
                            setTimeout(() => closeQuestion(), 1000);
                        }
                    });
                }
            });
        }

        function closeQuestion() {
            database.ref('rooms/' + currentRoom + '/currentQuestion/active').set(false);
            
            // Calculate results
            const question = questions[currentQuestionIndex];
            answersRef.once('value', (snapshot) => {
                const answers = snapshot.val() || {};
                const answersArray = Object.entries(answers).map(([playerId, data]) => ({
                    playerId,
                    ...data
                })).sort((a, b) => a.time - b.time);

                let fastestCorrect = null;
                const results = answersArray.map((answer, index) => {
                    const isCorrect = answer.answer === question.correct;
                    let points = 0;

                    if (isCorrect) {
                        if (!fastestCorrect) {
                            fastestCorrect = answer;
                            points = 10; // First correct answer
                        } else {
                            // Points based on speed (10 to 1)
                            points = Math.max(10 - index, 1);
                        }

                        // Update player score
                        database.ref('rooms/' + currentRoom + '/players/' + answer.playerId + '/score')
                            .transaction((currentScore) => {
                                return (currentScore || 0) + points;
                            });
                    }

                    return { ...answer, isCorrect, points };
                });

                displayResults(results, fastestCorrect);
            });

            answersRef.off();
            document.getElementById('sendQuestionBtn').disabled = false;
        }

        function displayResults(results, fastestCorrect) {
            const resultsContent = document.getElementById('resultsContent');
            const question = questions[currentQuestionIndex];

            let html = '';

            if (fastestCorrect) {
                html += `
                    <div class="fastest-player">
                        <i class="fas fa-bolt" style="font-size: 2rem; color: #ff6b6b;"></i>
                        <h3 style="margin: 10px 0;">أسرع إجابة صحيحة ⚡</h3>
                        <p style="font-size: 1.5rem; font-weight: 700;">${fastestCorrect.name}</p>
                    </div>
                `;
            }

            html += `
                <div style="background: white; padding: 15px; border-radius: 10px; margin-bottom: 15px;">
                    <h4 style="color: #4caf50; margin-bottom: 10px;">✓ الإجابة الصحيحة:</h4>
                    <p style="font-size: 1.2rem; font-weight: 600;">${question.options[question.correct]}</p>
                </div>
            `;

            if (results.length > 0) {
                html += '<h4 style="margin: 20px 0 10px 0; color: #667eea;">نتائج اللاعبين:</h4>';
                results.forEach(result => {
                    const icon = result.isCorrect ? '✓' : '✗';
                    const color = result.isCorrect ? '#4caf50' : '#f44336';
                    html += `
                        <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-right: 4px solid ${color};">
                            <span><strong>${result.name}</strong>: ${question.options[result.answer]}</span>
                            <span style="color: ${color}; font-weight: 700;">${icon} ${result.isCorrect ? '+' + result.points : '0'} نقطة</span>
                        </div>
                    `;
                });
            } else {
                html += '<p style="text-align: center; color: #999; padding: 20px;">لم يجب أي لاعب</p>';
            }

            resultsContent.innerHTML = html;
            document.getElementById('resultsDisplay').style.display = 'block';
        }

        function nextQuestion() {
            document.getElementById('resultsDisplay').style.display = 'none';
            updateQuestionDisplay();
        }

        function endGame() {
            if (confirm('هل تريد إنهاء المسابقة؟')) {
                if (currentRoom) {
                    database.ref('rooms/' + currentRoom).remove();
                }
                showHome();
            }
        }

        // ================================
        // Player Functions
        // ================================
        function playerJoin() {
            const roomCode = document.getElementById('roomCode').value.trim();
            const playerName = document.getElementById('playerName').value.trim();

            if (!roomCode || roomCode.length !== 3) {
                showError('playerLoginError', 'يرجى إدخال كود الغرفة (3 أرقام)');
                return;
            }

            if (!playerName) {
                showError('playerLoginError', 'يرجى إدخال اسمك');
                return;
            }

            // Check if room exists
            database.ref('rooms/' + roomCode).once('value', (snapshot) => {
                if (!snapshot.exists()) {
                    showError('playerLoginError', 'الغرفة غير موجودة! تأكد من الكود');
                    return;
                }

                currentRoom = roomCode;
                const playerId = 'player_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
                currentPlayer = { id: playerId, name: playerName };

                // Add player to room
                database.ref('rooms/' + roomCode + '/players/' + playerId).set({
                    name: playerName,
                    score: 0,
                    joined: Date.now()
                }).then(() => {
                    document.getElementById('playerNameDisplay').textContent = playerName;
                    document.getElementById('playerRoomCode').textContent = roomCode;
                    document.getElementById('playerScore').textContent = '0';
                    showScreen('playerScreen');
                    listenToQuestions();
                    listenToScore();
                });
            });
        }

        function listenToQuestions() {
            questionRef = database.ref('rooms/' + currentRoom + '/currentQuestion');
            questionRef.on('value', (snapshot) => {
                const question = snapshot.val();
                if (question && question.active) {
                    displayQuestion(question);
                } else {
                    showWaitingState();
                }
            });
        }

        function listenToScore() {
            database.ref('rooms/' + currentRoom + '/players/' + currentPlayer.id + '/score')
                .on('value', (snapshot) => {
                    const score = snapshot.val() || 0;
                    document.getElementById('playerScore').textContent = score;
                });
        }

        function showWaitingState() {
            document.getElementById('waitingState').style.display = 'block';
            document.getElementById('questionState').style.display = 'none';
            if (questionTimer) {
                clearInterval(questionTimer);
            }
        }

        function displayQuestion(question) {
            document.getElementById('waitingState').style.display = 'none';
            document.getElementById('questionState').style.display = 'block';
            document.getElementById('playerResult').style.display = 'none';

            document.getElementById('playerQuestionText').textContent = question.question;

            const answersGrid = document.getElementById('playerAnswers');
            answersGrid.innerHTML = question.options.map((option, index) => `
                <button class="answer-btn option-${index}" onclick="submitAnswer(${index})">
                    ${option}
                </button>
            `).join('');

            startTimer(20, question.startTime);
        }

        function startTimer(duration, startTime) {
            if (questionTimer) {
                clearInterval(questionTimer);
            }

            const timerDisplay = document.getElementById('timerDisplay');
            const timerProgress = document.getElementById('timerProgress');

            const endTime = startTime + (duration * 1000);

            questionTimer = setInterval(() => {
                const now = Date.now();
                const remaining = Math.max(0, Math.ceil((endTime - now) / 1000));
                
                timerDisplay.textContent = remaining;
                const progress = (remaining / duration) * 100;
                timerProgress.style.width = progress + '%';

                if (remaining <= 0) {
                    clearInterval(questionTimer);
                    disableAnswers();
                }
            }, 100);
        }

        function submitAnswer(answerIndex) {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);

            const answerTime = Date.now() - questionStartTime;

            // Save answer to Firebase
            database.ref('rooms/' + currentRoom + '/answers/' + currentPlayer.id).set({
                name: currentPlayer.name,
                answer: answerIndex,
                time: answerTime
            });

            // Check if correct
            const currentQuestion = questions[currentQuestionIndex];
            const isCorrect = answerIndex === currentQuestion.correct;

            buttons[answerIndex].classList.add(isCorrect ? 'correct' : 'wrong');
            buttons[currentQuestion.correct].classList.add('correct');

            showPlayerResult(isCorrect);

            if (questionTimer) {
                clearInterval(questionTimer);
            }
        }

        function showPlayerResult(isCorrect) {
            const resultDiv = document.getElementById('playerResult');
            resultDiv.style.display = 'block';

            if (isCorrect) {
                resultDiv.style.background = 'linear-gradient(135deg, #4caf50 0%, #8bc34a 100%)';
                resultDiv.style.color = 'white';
                resultDiv.innerHTML = `
                    <i class="fas fa-check-circle" style="font-size: 3rem;"></i>
                    <h3 style="margin: 15px 0;">إجابة صحيحة! 🎉</h3>
                `;
                playSound('correct');
                createConfetti();
            } else {
                resultDiv.style.background = 'linear-gradient(135deg, #f44336 0%, #e91e63 100%)';
                resultDiv.style.color = 'white';
                resultDiv.innerHTML = `
                    <i class="fas fa-times-circle" style="font-size: 3rem;"></i>
                    <h3 style="margin: 15px 0;">إجابة خاطئة</h3>
                `;
                playSound('wrong');
            }
        }

        function disableAnswers() {
            const buttons = document.querySelectorAll('.answer-btn');
            buttons.forEach(btn => btn.disabled = true);
        }

        function leaveGame() {
            if (confirm('هل تريد مغادرة المسابقة؟')) {
                if (currentRoom && currentPlayer) {
                    database.ref('rooms/' + currentRoom + '/players/' + currentPlayer.id).remove();
                }
                showHome();
            }
        }

        // ================================
        // Helper Functions
        // ================================
        function showError(elementId, message) {
            document.getElementById(elementId).innerHTML = `<div class="error-message">${message}</div>`;
        }

        function playSound(type) {
            // You can add audio files here
            // const audio = new Audio(type === 'correct' ? 'correct.mp3' : 'wrong.mp3');
            // audio.play();
        }

        function createConfetti() {
            const colors = ['#ff6b6b', '#4ecdc4', '#45b7d1', '#ffd93d', '#6bcf7f'];
            for (let i = 0; i < 50; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.style.position = 'fixed';
                    confetti.style.width = '10px';
                    confetti.style.height = '10px';
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = '-10px';
                    confetti.style.borderRadius = '50%';
                    confetti.style.pointerEvents = 'none';
                    confetti.style.animation = 'confetti-fall 3s linear';
                    document.body.appendChild(confetti);

                    setTimeout(() => confetti.remove(), 3000);
                }, i * 30);
            }
        }

        // ================================
        // Cleanup on page unload
        // ================================
        window.addEventListener('beforeunload', () => {
            if (currentRoom && currentPlayer && !isHost) {
                database.ref('rooms/' + currentRoom + '/players/' + currentPlayer.id).remove();
            }
        });
    </script>
</body>
